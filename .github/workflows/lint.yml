name: Lint

on:
  push:
    branches:
      - "!main"
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: markdownlint
        run: make markdownlint
      - name: prune
        run: make prune
