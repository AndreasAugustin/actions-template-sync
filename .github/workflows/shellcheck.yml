name: shellcheck

on:
  push:
    branches:
      - "!main"
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run shellcheck in container
        run: make shellcheck
